# Builds Flutter web and publishes to GitHub Pages on every push to main/master.
#
# One-time repo setup (GitHub.com → your repo → Settings → Pages):
#   Source: GitHub Actions
#
# Also add your Pages URL to Firebase → Authentication → Authorized domains:
#   yourusername.github.io

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # --pwa-strategy=none disables the service worker so every visit loads the
      # latest deploy (no stale-cache surprises). The app still works online
      # (Firestore) and keeps drafts via localStorage.
      - name: Build web
        run: flutter build web --release --pwa-strategy=none --base-href "/${{ github.event.repository.name }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
