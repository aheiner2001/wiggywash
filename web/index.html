<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Car wash sales-team scorecard tracker.">
  <meta name="theme-color" content="#1B2A4A">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Wiggy Wash">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Wiggy Wash Scorecard</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { background-color: #FFFFFF; }
    #ww-splash {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: opacity .3s ease; z-index: 9999;
    }
    #ww-splash img { width: 180px; max-width: 60vw; }
    #ww-splash .spinner {
      margin-top: 22px; width: 30px; height: 30px; border-radius: 50%;
      border: 3px solid #E2E7EF; border-top-color: #1B2A4A;
      animation: ww-spin 0.9s linear infinite;
    }
    @keyframes ww-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="ww-splash">
    <img src="icons/Icon-192.png" alt="Wiggy Wash" onerror="this.style.display='none'"/>
    <div class="spinner"></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('ww-splash');
      if (s) { s.style.opacity = '0'; setTimeout(function(){ s.remove(); }, 350); }
    });
  </script>
</body>
</html>
